name: Build and Push NE301 Dev Docker Images

on:
  workflow_dispatch:
    inputs:
      stedgeai_variant:
        description: 'STEdgeAI variant to build (all = 2.2 + 3.0 + 4.0)'
        required: false
        type: choice
        options:
          - all
          - '3.0'
          - '4.0'
          - '2.2'
        default: all
      push:
        description: 'Push to Docker Hub (camthink/ne301-dev)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY_IMAGE: camthink/ne301-dev

jobs:
  setup:
    name: Configure image matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set image build matrix
        id: set-matrix
        run: |
          set -e
          SELECTED="${{ github.event.inputs.stedgeai_variant }}"
          ALL='[
            {"stedgeai_variant":"2.2","docker_tag":"v2.2"},
            {"stedgeai_variant":"3.0","docker_tag":"v3.0"},
            {"stedgeai_variant":"4.0","docker_tag":"v4.0"}
          ]'
          case "$SELECTED" in
            all) MATRIX="$ALL" ;;
            2.2) MATRIX='[{"stedgeai_variant":"2.2","docker_tag":"v2.2"}]' ;;
            3.0) MATRIX='[{"stedgeai_variant":"3.0","docker_tag":"v3.0"}]' ;;
            4.0) MATRIX='[{"stedgeai_variant":"4.0","docker_tag":"v4.0"}]' ;;
            *)
              echo "::error::Unsupported variant: $SELECTED"
              exit 1
              ;;
          esac
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build-image:
    name: Docker image (STEdgeAI ${{ matrix.stedgeai_variant }})
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event.inputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event.inputs.push == 'true' }}
          tags: |
            ${{ env.REGISTRY_IMAGE }}:${{ matrix.docker_tag }}
          build-args: |
            STEDGEAI_VARIANT=${{ matrix.stedgeai_variant }}
          cache-from: type=gha,scope=ne301-dev-${{ matrix.stedgeai_variant }}
          cache-to: type=gha,mode=max,scope=ne301-dev-${{ matrix.stedgeai_variant }}
