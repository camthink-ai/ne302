name: Build NE301 STM32 Firmware

on:
  push:
    branches:
      - '*'
    tags:
      - '*'
  pull_request:
    branches:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for artifact naming (e.g., v1.0.0)'
        required: false
        type: string
        default: ''
      stedgeai_variant:
        description: 'ST Edge AI / NPU runtime variant (all = build every variant)'
        required: false
        type: choice
        options:
          - '4.0'
          - '3.0'
          - '2.2'
          - all
        default: '4.0'

env:
  ARTIFACT_NAME: ne301-firmware

jobs:
  setup:
    name: Configure build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set STEdgeAI variant matrix
        id: set-matrix
        run: |
          set -e
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            SELECTED="${{ github.event.inputs.stedgeai_variant }}"
          else
            # push / PR / tag: default production variant only
            SELECTED="4.0"
          fi

          ALL='[
            {"stedgeai_variant":"3.0","docker_image":"camthink/ne301-dev:v3.0"},
            {"stedgeai_variant":"4.0","docker_image":"camthink/ne301-dev:v4.0"},
            {"stedgeai_variant":"2.2","docker_image":"camthink/ne301-dev:v2.2"}
          ]'

          case "$SELECTED" in
            all)
              MATRIX="$ALL"
              ;;
            3.0)
              MATRIX='[{"stedgeai_variant":"3.0","docker_image":"camthink/ne301-dev:v3.0"}]'
              ;;
            4.0)
              MATRIX='[{"stedgeai_variant":"4.0","docker_image":"camthink/ne301-dev:v4.0"}]'
              ;;
            2.2)
              MATRIX='[{"stedgeai_variant":"2.2","docker_image":"camthink/ne301-dev:v2.2"}]'
              ;;
            *)
              echo "::error::Unsupported STEdgeAI variant: $SELECTED"
              exit 1
              ;;
          esac

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Build matrix: $MATRIX"

  build:
    name: Build Firmware (STEdgeAI ${{ matrix.stedgeai_variant }})
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}

    container:
      image: ${{ matrix.docker_image }}
      volumes:
        - ${{ github.workspace }}:/workspace
    defaults:
      run:
        shell: bash
        working-directory: /workspace

    outputs:
      is_tag: ${{ steps.context.outputs.is_tag }}
      version: ${{ steps.context.outputs.version }}
      artifact_name: ${{ steps.context.outputs.artifact_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine build context
        id: context
        run: |
          set -e
          REF="${{ github.ref }}"
          EVENT="${{ github.event_name }}"
          MANUAL_VERSION="${{ inputs.version }}"
          VARIANT="${{ matrix.stedgeai_variant }}"

          if [ "$EVENT" = "workflow_dispatch" ] && [ -n "$MANUAL_VERSION" ]; then
            IS_TAG=false
            VERSION="$MANUAL_VERSION"
            echo "Using manually specified version: $VERSION"
          elif echo "$REF" | grep -q "^refs/tags/"; then
            IS_TAG=true
            VERSION="${REF#refs/tags/}"
            echo "Detected tag: $VERSION"
          else
            IS_TAG=false
            VERSION="${GITHUB_SHA:0:7}"
            echo "Using commit SHA: $VERSION"
          fi

          ARTIFACT_NAME="${{ env.ARTIFACT_NAME }}-${VERSION}-stedgeai-${VARIANT}"

          # Release job consumes the default (4.0) production artifact only
          if [ "$VARIANT" = "4.0" ]; then
            echo "is_tag=$IS_TAG" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
          fi

          echo "::notice::Build context determined"
          echo "  Event: $EVENT"
          echo "  STEdgeAI: $VARIANT"
          echo "  Docker: ${{ matrix.docker_image }}"
          echo "  Is Tag: $IS_TAG"
          echo "  Version: $VERSION"
          echo "  Artifact: $ARTIFACT_NAME"

      - name: Show build information
        run: |
          echo "::group::📋 Build Information"
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "Version: ${{ steps.context.outputs.version }}"
          echo "Artifact: ${{ steps.context.outputs.artifact_name }}"
          echo "STEdgeAI variant: ${{ matrix.stedgeai_variant }}"
          echo "Docker image: ${{ matrix.docker_image }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "Manual Version: ${{ inputs.version }}"
          fi
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "::endgroup::"
          uname -a
          source /etc/profile.d/stedgeai.sh
          stedgeai --version 2>/dev/null | head -1 || echo "stedgeai version check skipped"

      - name: Build firmware
        run: |
          set -e
          echo "::group::🔨 Building firmware"
          source /etc/profile.d/stedgeai.sh

          echo "Cleaning previous build..."
          make clean STEDGEAI_VARIANT=${{ matrix.stedgeai_variant }}

          echo "Building firmware (STEDGEAI_VARIANT=${{ matrix.stedgeai_variant }})..."
          make all STEDGEAI_VARIANT=${{ matrix.stedgeai_variant }}

          echo "Creating package..."
          make pkg STEDGEAI_VARIANT=${{ matrix.stedgeai_variant }}

          echo "Packing HEX..."
          make pack-hex STEDGEAI_VARIANT=${{ matrix.stedgeai_variant }}

          echo "::notice::Build completed successfully"
          echo "::endgroup::"

      - name: Verify build artifacts
        if: success()
        run: |
          echo "::group::✅ Verify build artifacts"
          if [ ! -d "build" ]; then
            echo "::error::Build directory not found"
            exit 1
          fi

          BIN_COUNT=$(find build -name "*.bin" -type f 2>/dev/null | wc -l)
          if [ "$BIN_COUNT" -eq 0 ]; then
            echo "::error::No .bin files found in build directory"
            exit 1
          fi

          echo "Found $BIN_COUNT binary file(s):"
          ls -lh build/*.bin

          HEX_COUNT=$(find build -name "*.hex" -type f 2>/dev/null | wc -l)
          echo "Found $HEX_COUNT hex file(s):"
          ls -lh build/*.hex 2>/dev/null || true
          echo "::endgroup::"

      - name: Upload build artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.context.outputs.artifact_name }}
          path: |
            ./build/*.bin
            ./build/*.hex
          retention-days: 30
          compression-level: 6

  release:
    name: Create Release
    needs: build
    if: needs.build.outputs.is_tag == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: ./build

      - name: Verify release artifacts
        run: |
          set -e
          echo "::group::✅ Verify release artifacts"

          if [ ! -d "./build" ]; then
            echo "::error::Build directory not found"
            exit 1
          fi

          FSBL_COUNT=$(find ./build -name "*FSBL_signed.bin" -type f 2>/dev/null | wc -l)
          PKG_COUNT=$(find ./build -name "*_pkg.bin" -type f 2>/dev/null | wc -l)
          WAKECORE_COUNT=$(find ./build -name "*_wakecore.bin" -type f 2>/dev/null | wc -l)

          echo "Found artifacts:"
          echo "  FSBL: $FSBL_COUNT file(s)"
          echo "  Package: $PKG_COUNT file(s)"
          echo "  WakeCore: $WAKECORE_COUNT file(s)"

          TOTAL=$(find ./build -name "*.bin" -type f 2>/dev/null | wc -l)
          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No build artifacts found for release"
            exit 1
          fi

          echo "Total: $TOTAL binary file(s)"
          ls -lh ./build/*.bin
          echo "::endgroup::"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Release ${{ needs.build.outputs.version }}
          body: |
            ## NE301 Firmware Release ${{ needs.build.outputs.version }}

            ### 📦 Build Information
            - **Version**: `${{ needs.build.outputs.version }}`
            - **STEdgeAI variant**: `4.0` (production default)
            - **Commit**: `${{ github.sha }}`
            - **Build Date**: ${{ github.event.head_commit.timestamp || github.run_started_at }}

            ### 📁 Artifacts
            This release includes the following firmware binaries:
            - **`*_FSBL_signed.bin`** - Files for flashing the FSBL (not for OTA)
            - **`*_pkg.bin`** - Files for OTA
            - **`*_WakeCore.bin`** - Files for flashing the WakeCore
            - **`*.hex`** - Combined HEX file for STM32CubeProgrammer one-click flash

            Other STEdgeAI variants (`3.0`, `2.2`) can be built via **Actions → workflow_dispatch**.

            ---
            *Automatically generated by GitHub Actions*
          files: |
            ./build/*_FSBL_signed.bin
            ./build/*_pkg.bin
            ./build/*_WakeCore.bin
            ./build/*.hex
          draft: false
          prerelease: false
          generate_release_notes: false
